; ===================================================================
; SAM (Simple Attract Mode) Configuration
; ===================================================================

[sam]

; --- General Attract Mode ---
; Seconds to wait before switching to the next game
delay = 30

; Shuffle order instead of sequential
random = false

; Continue through all systems instead of staying in one
cycle_all = false

; Overlay on/off (uses framebuffer to display “Now Playing” text)
show_overlay = true

; Exclude specific systems (comma-separated IDs, e.g. "nes,snes,arcade")
exclude = 

; -------------------------------------------------------------------
; Input Controls (fixed in code, documented here)
; -------------------------------------------------------------------
; Gamepad:
;   START         → Skip game
;   SELECT        → Exit SAM
;   DPAD_RIGHT    → Next game
;   DPAD_LEFT     → Previous game
;   Y             → Open search
;
; Keyboard:
;   q             → Quit SAM
;   n             → Next game
;   p             → Previous game
;   /             → Open search
;
; These bindings are built into SAM and not configurable here.

; -------------------------------------------------------------------
; Paths
; (Leave blank — SAM will auto-detect from your global config)
; -------------------------------------------------------------------
games_folder    = 
arcade_folder   = 
computer_folder = 

; -------------------------------------------------------------------
; Metadata
; (ArcadeDB metadata is supported if present, but optional)
; -------------------------------------------------------------------
arcade_use_metadata = true
