; =======================================================
; Smart Attract Mode (SAM) Configuration
; =======================================================
; All options are shown here. Commented entries are optional.
; If left blank, SAM will automatically scan /media/fat and /media/usb*
; for games, arcades, and computer cores using existing mrext logic.
; =======================================================
;
; === Runtime Controls (while SAM is running) ===
; Gamepad:
;   START        → skip current game (next immediately)
;   SELECT       → quit attract mode
;   DPAD RIGHT   → next game immediately
;   DPAD LEFT    → previous game immediately
;   Y            → open search (on-screen keyboard + list picker)
;
; Keyboard:
;   q → quit attract mode
;   n → next game immediately
;   p → previous game immediately
;   / → open search
;
; === Command-line flags (if run manually) ===
;   -delay <seconds>     Override [attract].delay
;   -random              Force random mode on
;   -cycle-all           Force cycle through all systems
;
; === Built-in behaviors ===
;   nodupe  → automatic: duplicates are removed via dupes.FilterUniqueFilenames
;   run     → automatic: all launches go through mister.LaunchGenericFile
;
; =======================================================

[systems]
; --- System paths (optional overrides) ---
; By default SAM will find games in /media/fat and /media/usb* automatically.
; Uncomment and edit these if you want to override or add custom locations.

; games_folder    = /media/fat/games,/media/usb0/games,/media/usb1/games
; arcade_folder   = /media/fat/_Arcade,/media/usb0/_Arcade
; computer_folder = /media/fat/_Computer,/media/usb0/_Computer
; extra_paths     = /media/usb2/roms,/media/usb3/stuff

[attract]
; --- Playback control ---
delay      = 45          ; Seconds to wait before switching to next game (default 40)
random     = true        ; Randomize game order (default false)
cycle_all  = true        ; Cycle through all systems (default false)
exclude    = lynx, ao486 ; Comma-separated list of systems to skip

; --- Overlay settings ---
show_overlay        = true   ; Show "Now Playing" overlay on framebuffer
arcade_use_metadata = true   ; Use ArcadeDB metadata for arcade games

; --- Logging ---
log_to_playlog = true        ; Add games launched to playlog database
; Log file also written to: /var/log/mrext-sam.log

[network]
; --- Optional networking features (not required for attract mode) ---
; enable_mdns   = true    ; Advertise SAM service on network
; ssh_keys_sync = true    ; Sync authorized_keys for remote access

[search]
; --- Search backend settings ---
use_sqlindex = true   ; Use SQL-based index (recommended)
; use_txtindex = false ; Alternative plain text index (slower)
